<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ATV-Teams" />
    <title>ATV-Teams</title>
    <!-- ATV_TEAMS_RUNTIME_BRANDING_START -->
    <!-- ATV_TEAMS_RUNTIME_BRANDING_END -->
    <!-- ATV_TEAMS_FAVICON_START -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- ATV_TEAMS_FAVICON_END -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        // One-shot migration: rename legacy paperclip.* and paperclip:* localStorage keys to atv-teams.*/atv-teams:*
        try {
          const remaps = [
            { from: "paperclip.", to: "atv-teams." },
            { from: "paperclip:", to: "atv-teams:" },
          ];
          const allKeys = [];
          for (let i = 0; i < window.localStorage.length; i += 1) {
            const k = window.localStorage.key(i);
            if (k) allKeys.push(k);
          }
          for (const legacyKey of allKeys) {
            const remap = remaps.find((r) => legacyKey.startsWith(r.from));
            if (!remap) continue;
            const newKey = remap.to + legacyKey.slice(remap.from.length);
            if (window.localStorage.getItem(newKey) === null) {
              const value = window.localStorage.getItem(legacyKey);
              if (value !== null) window.localStorage.setItem(newKey, value);
            }
            window.localStorage.removeItem(legacyKey);
          }
        } catch {}
        const key = "atv-teams.theme";
        const darkThemeColor = "#18181b";
        const lightThemeColor = "#ffffff";
        try {
          const stored = window.localStorage.getItem(key);
          const theme = stored === "light" || stored === "dark" ? stored : "dark";
          const isDark = theme === "dark";
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute("content", isDark ? darkThemeColor : lightThemeColor);
          }
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
